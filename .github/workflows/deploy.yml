name: Deploy Lambda Functions

on:
  push:
    branches:
      - main
    paths:
      - 'src/producer_yfinance/**'
      - 'src/producer_coingecko/**'
      - 'src/consumer_s3/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Permite disparo manual

jobs:
  deploy:
    name: Deploy ${{ matrix.function_name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - function_dir: producer_yfinance
            function_name: financial-producer-yfinance
          - function_dir: producer_coingecko
            function_name: financial-producer-coingecko
          - function_dir: consumer_s3
            function_name: financial-consumer-s3
    env:
      FUNCTION_DIR: ${{ matrix.function_dir }}
      FUNCTION_NAME: ${{ matrix.function_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Check Docker availability
        run: |
          docker --version
          echo "Docker is ready"
          
      - name: Create temporary directory for deployment package
        run: |
          mkdir -p /tmp/lambda_package
          echo "Temporary directory created"

      - name: Install dependencies using Amazon Linux Docker container
        run: |
          # Usa a imagem oficial da Lambda Python 3.12 para instalar dependências
          # Define o usuário dentro do contêiner para corresponder ao usuário do host
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --entrypoint pip \
            -v ${{ github.workspace }}/src/${{ env.FUNCTION_DIR }}/requirements.txt:/tmp/requirements.txt \
            -v /tmp/lambda_package:/tmp/lambda_package \
            public.ecr.aws/lambda/python:3.12 \
            install --target /tmp/lambda_package -r /tmp/requirements.txt
          echo "Dependencies installed in Amazon Linux compatible environment"

      - name: Copy Lambda function code
        run: |
          cp ${{ github.workspace }}/src/${{ env.FUNCTION_DIR }}/lambda_function.py /tmp/lambda_package/
          echo "Lambda function copied"

      - name: Create deployment package (zip)
        run: |
          cd /tmp/lambda_package
          zip -r9 ${{ github.workspace }}/deployment_package.zip .
          echo "Deployment package created"
          
      - name: Generate unique S3 key
        id: s3key
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          COMMIT_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-8)
          S3_KEY="deployment_packages/${{ env.FUNCTION_NAME }}-${COMMIT_SHA_SHORT}-${TIMESTAMP}.zip"
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_OUTPUT
          echo "Generated S3 key: ${S3_KEY}"

      - name: Upload deployment package to S3 bucket
        env:
          S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          # Verificar se o bucket foi fornecido
          if [ -z "$S3_BUCKET_NAME" ]; then
            echo "Error: AWS_S3_BUCKET_NAME secret is not set"
            exit 1
          fi
          # Fazer upload do zip para o S3
          aws s3 cp ${{ github.workspace }}/deployment_package.zip s3://$S3_BUCKET_NAME/${{ steps.s3key.outputs.S3_KEY }}
          echo "Deployment package uploaded to S3 bucket: $S3_BUCKET_NAME, key: ${{ steps.s3key.outputs.S3_KEY }}"

      - name: Update Lambda function code from S3
        env:
          S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.FUNCTION_NAME }} \
            --s3-bucket $S3_BUCKET_NAME \
            --s3-key ${{ steps.s3key.outputs.S3_KEY }} \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}
          echo "Lambda function updated successfully from S3"

      - name: Clean up temporary files
        run: |
          rm -rf /tmp/lambda_package
          rm -f ${{ github.workspace }}/deployment_package.zip
          echo "Temporary files cleaned up"
