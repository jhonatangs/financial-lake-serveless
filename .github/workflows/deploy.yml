name: Deploy Lambda Producer yFinance

on:
  push:
    branches:
      - main
    paths:
      - 'src/producer_yfinance/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Permite disparo manual

jobs:
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # Versão especificada na spec

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Check Docker availability
        run: |
          docker --version
          echo "Docker is ready"
          
      - name: Create temporary directory for deployment package
        run: |
          mkdir -p /tmp/lambda_package
          echo "Temporary directory created"

      - name: Install dependencies with cross‑compilation flags
        run: |
          cd /tmp/lambda_package
          # Força a instalação de wheels compatíveis com Amazon Linux (manylinux2014_x86_64)
          pip install \
            --platform manylinux2014_x86_64 \
            --target . \
            --only-binary=:all: \
            --python-version 3.12 \
            --implementation cp \
            --abi cp312 \
            -r ${{ github.workspace }}/src/producer_yfinance/requirements.txt
          echo "Dependencies installed for Amazon Linux"
          
          # Se houver falha, tenta uma instalação mais permissiva (pode ser necessário para alguns pacotes)
          if [ $? -ne 0 ]; then
            echo "First attempt failed, trying without platform restriction (pure Python fallback)..."
            pip install \
              --target . \
              --no-binary :all: \
              -r ${{ github.workspace }}/src/producer_yfinance/requirements.txt
          fi

      - name: Copy Lambda function code
        run: |
          cp ${{ github.workspace }}/src/producer_yfinance/lambda_function.py /tmp/lambda_package/
          echo "Lambda function copied"

      - name: Create deployment package (zip)
        run: |
          cd /tmp/lambda_package
          zip -r9 ${{ github.workspace }}/deployment_package.zip .
          echo "Deployment package created"
          
      - name: Generate unique S3 key
        id: s3key
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          COMMIT_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-8)
          S3_KEY="deployment_packages/financial-producer-yfinance-${COMMIT_SHA_SHORT}-${TIMESTAMP}.zip"
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_OUTPUT
          echo "Generated S3 key: ${S3_KEY}"

      - name: Upload deployment package to S3 bucket
        env:
          S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          # Verificar se o bucket foi fornecido
          if [ -z "$S3_BUCKET_NAME" ]; then
            echo "Error: AWS_S3_BUCKET_NAME secret is not set"
            exit 1
          fi
          # Fazer upload do zip para o S3
          aws s3 cp ${{ github.workspace }}/deployment_package.zip s3://$S3_BUCKET_NAME/${{ steps.s3key.outputs.S3_KEY }}
          echo "Deployment package uploaded to S3 bucket: $S3_BUCKET_NAME, key: ${{ steps.s3key.outputs.S3_KEY }}"

      - name: Update Lambda function code from S3
        env:
          S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name financial-producer-yfinance \
            --s3-bucket $S3_BUCKET_NAME \
            --s3-key ${{ steps.s3key.outputs.S3_KEY }} \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}
          echo "Lambda function updated successfully from S3"

      - name: Clean up temporary files
        run: |
          rm -rf /tmp/lambda_package
          rm -f ${{ github.workspace }}/deployment_package.zip
          echo "Temporary files cleaned up"
